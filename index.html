<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>サウンドおじさんバルーン</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="サウンドおじさんバルーン">
      <section class="hud" aria-label="Game status">
        <div>
          <span class="hud-label">Stage</span>
          <strong id="stage">1</strong>
        </div>
        <div>
          <span class="hud-label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="hud-label">Speed</span>
          <strong id="level">1x</strong>
        </div>
      </section>

      <section id="gameArea" class="game-area" aria-label="タップして割れ！">
        <div class="cloud cloud-one"></div>
        <div class="cloud cloud-two"></div>
        <div class="cloud cloud-three"></div>
        <div id="startPanel" class="panel">
          <h1>サウンドおじさん<br>バルーン</h1>
          <p>3人のおじさんの顔が風船に！<br>タップしてパーン！<br><br>
          👓 <b>兄メガネ＝速い +2点</b><br>
          🧶 <b>弟おかっぱ＝遅い +1点</b><br>
          😊 <b>サウンドおじさん＝ふつう +3点</b></p>
          <button id="startButton" type="button">スタート！</button>
        </div>
      </section>

      <p class="hint">タップして風船を割れ！3種類のおじさんが飛んでるよ</p>
    </main>

    <script src="game.js"></script>
  </body>
</html>
